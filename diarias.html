<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Diárias - Câmara Municipal de Marília</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; margin: 0; padding: 10px; color: #333; }
        
        /* Contentor de Filtros Profissional */
        .filtros-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #e0e0e0; 
            margin-bottom: 20px; 
        }
        
        .campo-filtro { display: flex; flex-direction: column; }
        .campo-filtro label { font-size: 11px; font-weight: 700; color: #003b75; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .campo-filtro select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; background: white; cursor: pointer; }

        /* Botões de Exportação */
        .botoes-exportacao { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-export { 
            padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer; 
            font-weight: 600; font-size: 13px; display: flex; align-items: center; 
            gap: 8px; transition: 0.2s; color: white;
        }
        .btn-excel { background-color: #217346; }
        .btn-csv { background-color: #003b75; }
        .btn-export:hover { opacity: 0.85; transform: translateY(-1px); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Estilização da Tabela DataTables */
        .dataTables_wrapper { padding-top: 10px; }
        table.dataTable { width: 100% !important; border-collapse: collapse !important; border: 1px solid #ddd !important; font-size: 13px; }
        table.dataTable thead th { background-color: #003b75 !important; color: white !important; padding: 14px 10px !important; border-bottom: none !important; text-align: left; }
        table.dataTable tbody td { padding: 12px 10px !important; border-bottom: 1px solid #eee; }
        table.dataTable tbody tr:hover { background-color: #f1f5f9 !important; }
        
        /* Ajustes de Responsividade */
        @media (max-width: 600px) {
            .filtros-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="filtros-container">
        <div class="campo-filtro">
            <label>Gabinete / Setor</label>
            <select id="filtroGabinete"><option value="">Todos</option></select>
        </div>
        <div class="campo-filtro">
            <label>Servidor / Vereador</label>
            <select id="filtroServidor"><option value="">Todos</option></select>
        </div>
        <div class="campo-filtro">
            <label>Mês</label>
            <select id="filtroMes">
                <option value="">Todos</option>
                <option value="01">Janeiro</option><option value="02">Fevereiro</option>
                <option value="03">Março</option><option value="04">Abril</option>
                <option value="05">Maio</option><option value="06">Junho</option>
                <option value="07">Julho</option><option value="08">Agosto</option>
                <option value="09">Setembro</option><option value="10">Outubro</option>
                <option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
        </div>
        <div class="campo-filtro">
            <label>Ano</label>
            <select id="filtroAno"><option value="">Todos</option></select>
        </div>
    </div>

    <div class="botoes-exportacao">
        <button onclick="exportarXLSX()" class="btn-export btn-excel">📊 Exportar Excel (.xlsx)</button>
        <button onclick="exportarCSV()" class="btn-export btn-csv">📄 Exportar CSV (.csv)</button>
    </div>

    <table id="tabelaDiarias" class="display">
        <thead>
            <tr>
                <th>Data</th>
                <th>Nome</th>
                <th>Gabinete / Setor</th>
                <th>Destino</th>
                <th>Motivo</th>
                <th style="text-align: right;">Valor (R$)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        // URL da folha de cálculo principal formatada para CSV direto (evita erro de JSON)
        const CSV_URL = "https://docs.google.com/spreadsheets/d/1jw1AE_-VG0GvvWn5T6K-Io8nOnMiUydUlFuCYaYdN-M/export?format=csv&gid=0";
        let tabela;

        $(document).ready(function() {
            carregarDados();
        });

        async function carregarDados() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                
                // Processamento do CSV
                const linhas = data.split(/\r?\n/);
                const dadosFormatados = [];
                const gabinetes = new Set();
                const servidores = new Set();
                const anos = new Set();

                // Começamos na linha 1 para saltar o cabeçalho
                for (let i = 1; i < linhas.length; i++) {
                    // Regex para lidar com vírgulas dentro de aspas no CSV
                    const colunas = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (colunas.length >= 6) {
                        const item = {
                            data: colunas[0].replace(/"/g, '').trim(),
                            nome: colunas[1].replace(/"/g, '').trim(),
                            gabinete: colunas[2].replace(/"/g, '').trim(),
                            destino: colunas[3].replace(/"/g, '').trim(),
                            motivo: colunas[4].replace(/"/g, '').trim(),
                            valor: colunas[5].replace(/"/g, '').trim()
                        };

                        dadosFormatados.push(item);
                        
                        if(item.gabinete) gabinetes.add(item.gabinete);
                        if(item.nome) servidores.add(item.nome);
                        const ano = item.data.split('/')[2];
                        if(ano) anos.add(ano);
                    }
                }

                // Preencher Filtros Dinâmicos
                Array.from(gabinetes).sort().forEach(g => $('#filtroGabinete').append(`<option value="${g}">${g}</option>`));
                Array.from(servidores).sort().forEach(s => $('#filtroServidor').append(`<option value="${s}">${s}</option>`));
                Array.from(anos).sort().reverse().forEach(a => $('#filtroAno').append(`<option value="${a}">${a}</option>`));

                // Inicializar DataTables
                tabela = $('#tabelaDiarias').DataTable({
                    data: dadosFormatados,
                    columns: [
                        { data: 'data' },
                        { data: 'nome' },
                        { data: 'gabinete' },
                        { data: 'destino' },
                        { data: 'motivo' },
                        { data: 'valor', className: 'dt-right' }
                    ],
                    language: { url: 'https://cdn.datatables.net/plug-ins/1.11.5/i18n/pt-BR.json' },
                    pageLength: 15,
                    order: [[0, 'desc']]
                });

                // Lógica dos Filtros
                $('.filtros-container select').on('change', function() {
                    const gab = $('#filtroGabinete').val();
                    const serv = $('#filtroServidor').val();
                    const mes = $('#filtroMes').val();
                    const ano = $('#filtroAno').val();

                    tabela.column(2).search(gab).column(1).search(serv);

                    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
                        const dataColuna = data[0]; // Formato DD/MM/YYYY
                        const partes = dataColuna.split('/');
                        const m = partes[1];
                        const a = partes[2];
                        
                        return (mes === "" || m === mes) && (ano === "" || a === ano);
                    });

                    tabela.draw();
                    $.fn.dataTable.ext.search.pop();
                });

            } catch (error) {
                console.error("Erro ao carregar:", error);
            }
        }

        // --- NOME DE FICHEIRO DINÂMICO ---
        function obterNomeArquivo() {
            const gab = $('#filtroGabinete').val();
            const serv = $('#filtroServidor').val();
            const mes = $('#filtroMes').val();
            const ano = $('#filtroAno').val();

            if (!gab && !serv && !mes && !ano) return "diarias_completo";

            let nome = "diarias";
            if (gab) nome += "_" + gab;
            if (serv) nome += "_" + serv;
            if (mes) nome += "_" + mes;
            if (ano) nome += "_" + ano;

            return nome.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, "");
        }

        function exportarXLSX() {
            const dadosVisiveis = tabela.rows({ filter: 'applied' }).data().toArray();
            const ws = XLSX.utils.json_to_sheet(dadosVisiveis);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Diárias");
            XLSX.writeFile(wb, obterNomeArquivo() + ".xlsx");
        }

        function exportarCSV() {
            const dadosVisiveis = tabela.rows({ filter: 'applied' }).data().toArray();
            const headers = ["Data", "Nome", "Gabinete", "Destino", "Motivo", "Valor"];
            let csv = "\ufeff" + headers.join(",") + "\n";
            
            dadosVisiveis.forEach(row => {
                csv += [row.data, row.nome, row.gabinete, row.destino, row.motivo, row.valor]
                    .map(v => `"${String(v).replace(/"/g, '""')}"`).join(",") + "\n";
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = obterNomeArquivo() + ".csv";
            link.click();
        }
    </script>
</body>
</html>
