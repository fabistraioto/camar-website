<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relatório de Diárias e Adiantamentos - CMC</title>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* BASE E TIPOGRAFIA */
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f1f5f9; color: #1e293b; line-height: 1.5; }
        #wrapper { padding: 15px; max-width: 1200px; margin: 0 auto; }

        /* CABEÇALHO PADRÃO CMC */
        .topo { background: #003b75; color: white; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .topo h1 { margin: 0; font-size: 1.6rem; font-weight: 800; }
        .logo-camara { display: flex; flex-direction: column; align-items: center; }
        .logo-camara img { height: 55px; margin-bottom: 5px; }
        .logo-camara span { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: #cbd5e1; }

        /* LOADER */
        #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 250px; }
        .spinner { border: 4px solid #e2e8f0; border-top: 4px solid #003b75; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* PAINÉIS (FIELDSETS) */
        .painel { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; margin-bottom: 20px; position: relative; }
        .painel-titulo { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; padding: 0 10px; letter-spacing: 1px; }
        .badge-sinc { position: absolute; top: -12px; right: 20px; font-size: 10px; background: #d1fae5; color: #065f46; padding: 4px 12px; border-radius: 20px; border: 1px solid #a7f3d0; font-weight: 700; }

        /* NOVA ABORDAGEM: FLEXBOX FLOW PARA FILTROS E BOTÕES */
        .flex-group { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
        .flex-item { flex: 1 1 250px; } /* Ajusta base do tamanho, mas permite crescer */
        
        .flex-buttons { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; }
        .flex-buttons button { flex: 1 1 120px; } /* Botões nunca ficam gigantes sozinhos */

        /* INPUTS E BOTÕES */
        select, input, button { height: 42px; border-radius: 8px; border: 1px solid #cbd5e1; padding: 0 12px; font-size: 14px; box-sizing: border-box; width: 100%; }
        button { background: #003b75; color: white; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:hover { background: #00274d; transform: translateY(-1px); }
        .btn-destaque { background: #0284c7; }

        /* PAINEL DE TOTAIS FINANCEIROS */
        .totais-container { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .total-box { flex: 1 1 300px; background: white; border: 1px solid #e2e8f0; border-left: 5px solid #003b75; border-radius: 12px; padding: 15px 20px; }
        .total-box.azul { border-left-color: #0284c7; }
        .total-box label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .total-box span { font-size: 24px; font-weight: 800; color: #1e293b; }

        /* VISUALIZAÇÃO E DATATABLES */
        .visualizacao-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px; }
        .registros-badge { background: #e0f2fe; color: #0369a1; padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 13px; border: 1px solid #bae6fd; }

        #tabela thead { display: none; } /* Esconde cabeçalho da tabela real */
        table.dataTable { border: none !important; width: 100% !important; }

        /* CARD DE DIÁRIA (DESIGN ORIGINAL RECUPERADO) */
        .card-diaria { background: white; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .card-nome { font-size: 18px; font-weight: 800; color: #003b75; text-transform: uppercase; display: block; }
        .card-cargo { font-size: 13px; color: #64748b; font-weight: 500; text-transform: uppercase; }
        
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); padding: 15px 20px; gap: 15px; }
        .card-grid.separador { border-top: 1px dashed #f1f5f9; }
        .card-item label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 3px; }
        .card-item span { font-size: 14px; font-weight: 700; color: #1e293b; }

        .card-footer { background: #f8fafc; padding: 15px 20px; border-top: 1px solid #edf2f7; }
        .footer-row { margin-bottom: 10px; }
        .footer-row:last-child { margin-bottom: 0; }

        /* PAGINAÇÃO */
        .controles-inferiores { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 10px; flex-wrap: wrap; gap: 10px; }

        @media (max-width: 600px) {
            .topo { flex-direction: column; text-align: center; gap: 15px; }
            .card-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div id="wrapper">
    <header class="topo">
        <h1>Relatório de Diárias</h1>
        <div class="logo-camara">
            <img src="Brasão_de_Marília.png" alt="Câmara de Marília">
            <span>Câmara Municipal de Marília</span>
        </div>
    </header>

    <div id="loader"><div class="spinner"></div><span>Sincronizando dados...</span></div>

    <main id="main-content" style="display: none;">
        
        <fieldset class="painel">
            <legend class="painel-titulo">Filtros de Pesquisa</legend>
            <div id="sync-info" class="badge-sinc">⏳ Atualizando...</div>
            <div class="flex-group">
                <div class="flex-item"><input type="text" id="buscaNome" placeholder="Pesquisar por nome..."></div>
                <div class="flex-item"><select id="selGabinete"><option value="">Gabinete (Todos)</option></select></div>
                <div class="flex-item"><select id="selServidor"><option value="">Servidor (Todos)</option></select></div>
                <div class="flex-item" style="flex: 0 1 120px;"><select id="selMes"><option value="">Mês</option><option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option><option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option><option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option></select></div>
                <div class="flex-item" style="flex: 0 1 120px;"><select id="selAno"><option value="">Ano</option></select></div>
                <div class="flex-item" style="flex: 0 1 150px;"><button onclick="resetarFiltros()">Limpar Tudo</button></div>
            </div>
        </fieldset>

        <fieldset class="painel">
            <legend class="painel-titulo">Exportação e Ações</legend>
            <div class="flex-buttons">
                <button onclick="exportarCSV()">⬇️ CSV</button>
                <button onclick="exportarExcel()">⬇️ Excel</button>
                <button onclick="exportarJSON()">⬇️ JSON</button>
                <button onclick="exportarXML()">⬇️ XML</button>
                <button class="btn-destaque" onclick="window.print()">🖨️ Imprimir</button>
                <button class="btn-destaque" onclick="carregarDados()">🔄 Atualizar</button>
            </div>
        </fieldset>

        <div class="totais-container">
            <div class="total-box">
                <label>Total de Diárias (Filtrado)</label>
                <span id="txt-total-diarias">R$ 0,00</span>
            </div>
            <div class="total-box azul">
                <label>Total de Adiantamentos (Filtrado)</label>
                <span id="txt-total-adiantamentos">R$ 0,00</span>
            </div>
        </div>

        <fieldset class="painel" style="padding: 15px;">
            <legend class="painel-titulo">Visualização</legend>
            <div class="visualizacao-header">
                <div id="dt-length-place"></div>
                <div class="registros-badge"><span id="count-rows">0</span> registros encontrados</div>
            </div>
        </fieldset>

        <table id="tabela-base">
            <thead><tr><th>Dados</th></tr></thead>
            <tbody></tbody>
        </table>
    </main>
</div>

<script>
    const URL_DIARIAS = "https://docs.google.com/spreadsheets/d/1XP67Ojd_HK3S1IPvC_9eY32-lf0_qI3jfBfrLzasvQo/export?format=csv";
    const URL_GABINETES = "https://docs.google.com/spreadsheets/d/1GwDig1yn9YIX8FSsHFPHL2iLCtwsZkNnquNjp5D7Oaw/export?format=csv";

    let dadosBrutos = [];
    let gabinetesMap = [];
    let grid;

    // --- CARREGAMENTO ---
    async function carregarDados() {
        $('#loader').show();
        $('#main-content').hide();
        
        try {
            const [respD, respG] = await Promise.all([
                fetch(`${URL_DIARIAS}&t=${Date.now()}`),
                fetch(`${URL_GABINETES}&t=${Date.now()}`)
            ]);

            const textoD = await respD.text();
            const textoG = await respG.text();

            processarDados(textoD);
            processarGabinetes(textoG);
            
            popularSelects();
            renderizarGrid();

            $('#loader').hide();
            $('#main-content').fadeIn();
        } catch (erro) {
            alert("Erro ao conectar com a base de dados.");
            console.error(erro);
        }
    }

    function processarDados(csv) {
        const linhas = csv.trim().split("\n");
        // Extrai carimbo de atualização
        const infoSinc = csv.match(/MODIF_REAL:\s*(\d{2}\/\d{2}\/\d{4}[^\d]+\d{2}:\d{2})/i);
        if(infoSinc) $('#sync-info').text(`🟢 Atualizado em ${infoSinc[1]}`);

        const cabecalho = linhas[1].split(',').map(c => c.replace(/"/g, '').toLowerCase().trim());
        dadosBrutos = linhas.slice(2).map(linha => {
            const colunas = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            let obj = {};
            cabecalho.forEach((c, i) => obj[c] = (colunas[i] || "").replace(/"/g, '').trim());
            if(obj.servidor) obj.servidor = obj.servidor.toUpperCase();
            return obj;
        }).filter(d => d.servidor);
    }

    function processarGabinetes(csv) {
        const linhas = csv.trim().split("\n");
        listaGabinetes = linhas.slice(1).map(l => l.replace(/"/g, '').trim().toUpperCase());
    }

    // --- INTERFACE E FILTROS ---
    function popularSelects() {
        const gabs = [...new Set(listaGabinetes)].sort();
        $('#selGabinete').html('<option value="">Gabinete (Todos)</option>');
        gabs.forEach(g => $('#selGabinete').append(new Option(g, g)));

        const servs = [...new Set(dadosBrutos.map(d => d.servidor))].sort();
        $('#selServidor').html('<option value="">Servidor (Todos)</option>');
        servs.forEach(s => $('#selServidor').append(new Option(s, s)));

        const anos = [...new Set(dadosBrutos.map(d => d.data_partida.split('/')[2]))].filter(a => a).sort((a,b)=>b-a);
        $('#selAno').html('<option value="">Ano</option>');
        anos.forEach(a => $('#selAno').append(new Option(a, a)));
    }

    function filtrar() {
        const nome = ($('#buscaNome').val() || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const gab = $('#selGabinete').val();
        const serv = $('#selServidor').val();
        const mes = $('#selMes').val();
        const ano = $('#selAno').val();

        const filtrados = dadosBrutos.filter(d => {
            const dataParts = d.data_partida.split('/');
            const nNorm = d.servidor.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            const matchNome = !nome || nNorm.includes(nome);
            const matchGab = !gab || d.servidor.includes(gab) || (d.cargo && d.cargo.includes(gab));
            const matchServ = !serv || d.servidor === serv;
            const matchMes = !mes || dataParts[1] === mes;
            const matchAno = !ano || dataParts[2] === ano;

            return matchNome && matchGab && matchServ && matchMes && matchAno;
        });

        renderizarGrid(filtrados);
    }

    // --- RENDERIZAÇÃO ---
    function renderizarGrid(dados = dadosBrutos) {
        if (grid) { grid.destroy(); $('#dt-length-place').empty(); }

        grid = $('#tabela-base').DataTable({
            data: dados,
            pageLength: 10,
            ordering: false,
            dom: 'lrt<"controles-inferiores"ip>',
            language: { url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json', lengthMenu: "Exibir _MENU_ resultados" },
            columns: [{
                data: null,
                render: d => `
                    <div class="card-diaria">
                        <div class="card-header">
                            <span class="card-nome">${d.servidor}</span>
                            <span class="card-cargo">${d.cargo || "Não informado"}</span>
                        </div>
                        <div class="card-grid">
                            <div class="card-item"><label>Diárias</label><span>${d.qtde_diarias}</span></div>
                            <div class="card-item"><label>Partida</label><span>${d.data_partida}</span></div>
                            <div class="card-item"><label>Retorno</label><span>${d.data_retorno}</span></div>
                        </div>
                        <div class="card-grid separador">
                            <div class="card-item"><label>Valor Diárias</label><span>${formatarMoeda(d.valor_diarias)}</span></div>
                            <div class="card-item"><label>Adiantamento</label><span>${formatarMoeda(d.valor_adiantamento)}</span></div>
                            <div class="card-item"><label>Dotação</label><span>${d.dotacao || "-"}</span></div>
                        </div>
                        <div class="card-footer">
                            <div class="footer-row"><label class="card-item"><label>Destino</label><span>${d.cidade_destino}</span></div>
                            <div class="footer-row card-item"><label>Motivação</label><span style="font-weight:500; font-size:12px; display:block; margin-top:5px;">${d.motivacao_viagem}</span></div>
                        </div>
                    </div>`
            }],
            initComplete: function() {
                $('.dataTables_length').appendTo('#dt-length-place');
            },
            drawCallback: function() {
                calcularTotais(this.api().rows({filter:'applied'}).data());
                ajustarIframe();
            }
        });
    }

    // --- UTILITÁRIOS ---
    function calcularTotais(dados) {
        let somaD = 0, somaA = 0;
        const limpar = v => parseFloat((v || "0").replace(/R\$\s?|[.]/g, '').replace(',', '.')) || 0;
        
        dados.each(d => {
            somaD += limpar(d.valor_diarias);
            somaA += limpar(d.valor_adiantamento);
        });

        const fmt = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
        $('#txt-total-diarias').text(fmt.format(somaD));
        $('#txt-total-adiantamentos').text(fmt.format(somaA));
        $('#count-rows').text(dados.length);
    }

    function formatarMoeda(v) {
        if(!v || v === "0") return "R$ 0,00";
        return v.includes("R$") ? v : `R$ ${v}`;
    }

    function ajustarIframe() {
        const h = document.getElementById('wrapper').offsetHeight + 50;
        window.parent.postMessage({ tipo: 'ajustarAltura', valor: h }, '*');
    }

    function resetarFiltros() {
        $('input, select').val('');
        filtrar();
    }

    // --- EVENTOS ---
    $('#buscaNome').on('input', filtrar);
    $('select').on('change', filtrar);

    // --- EXPORTAÇÕES ---
    function exportarExcel() {
        const dados = grid.rows({filter:'applied'}).data().toArray();
        const ws = XLSX.utils.json_to_sheet(dados);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Diarias");
        XLSX.writeFile(wb, "relatorio_diarias.xlsx");
    }

    function exportarCSV() {
        let csv = "\ufeffServidor,Cargo,Diarias,Partida,Retorno,Valor,Adiantamento\n";
        grid.rows({filter:'applied'}).data().each(d => {
            csv += `"${d.servidor}","${d.cargo}","${d.qtde_diarias}","${d.data_partida}","${d.data_retorno}","${d.valor_diarias}","${d.valor_adiantamento}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "relatorio_diarias.csv";
        link.click();
    }

    window.onload = carregarDados;
</script>
</body>
</html>
